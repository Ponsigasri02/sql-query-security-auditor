<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="900" height="620" fill="#ffffff"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1e2a38"/>
    </marker>
  </defs>

  <!-- Browser -->
  <rect x="330" y="20" width="240" height="60" rx="8" fill="#1e2a38"/>
  <text x="450" y="45" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" font-weight="700" fill="#ffffff">Browser (Frontend)</text>
  <text x="450" y="63" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#b8c4d0">index.html · styles.css · app.js</text>

  <line x1="440" y1="80" x2="440" y2="118" stroke="#1e2a38" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="230" y="102" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#5a6b7b">POST /api/analyze</text>
  <line x1="460" y1="118" x2="460" y2="80" stroke="#5a6b7b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="680" y="102" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#5a6b7b">JSON response</text>

  <!-- QueryController -->
  <rect x="300" y="120" width="300" height="60" rx="8" fill="#ffffff" stroke="#1e2a38" stroke-width="2"/>
  <text x="450" y="145" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" font-weight="700" fill="#1e2a38">QueryController</text>
  <text x="450" y="163" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#5a6b7b">Spring Boot REST API (@RestController)</text>

  <line x1="450" y1="180" x2="450" y2="218" stroke="#1e2a38" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- QueryAnalysisAgent -->
  <rect x="240" y="220" width="420" height="70" rx="8" fill="#ffffff" stroke="#1e2a38" stroke-width="2"/>
  <text x="450" y="248" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" font-weight="700" fill="#1e2a38">QueryAnalysisAgent</text>
  <text x="450" y="266" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#5a6b7b">builds prompt · calls Gemini · parses JSON · self-checks</text>
  <text x="450" y="282" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#5a6b7b">retries once on malformed response</text>

  <!-- branch to PromptBuilder -->
  <line x1="330" y1="290" x2="200" y2="330" stroke="#1e2a38" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="70" y="332" width="220" height="55" rx="8" fill="#ffffff" stroke="#4da3ff" stroke-width="2"/>
  <text x="180" y="355" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" font-weight="700" fill="#1e2a38">PromptBuilder</text>
  <text x="180" y="373" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#5a6b7b">constructs the analysis prompt</text>

  <!-- branch to GeminiClient -->
  <line x1="570" y1="290" x2="700" y2="330" stroke="#1e2a38" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="590" y="332" width="220" height="55" rx="8" fill="#ffffff" stroke="#4da3ff" stroke-width="2"/>
  <text x="700" y="355" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" font-weight="700" fill="#1e2a38">GeminiClient</text>
  <text x="700" y="373" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#5a6b7b">WebClient → Gemini REST API</text>

  <!-- branch to Repository -->
  <line x1="450" y1="290" x2="450" y2="330" stroke="#1e2a38" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="340" y="332" width="220" height="55" rx="8" fill="#ffffff" stroke="#4da3ff" stroke-width="2"/>
  <text x="450" y="355" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" font-weight="700" fill="#1e2a38">QueryAnalysisRepository</text>
  <text x="450" y="373" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#5a6b7b">Spring Data MongoDB</text>

  <!-- Gemini API external -->
  <line x1="700" y1="387" x2="700" y2="425" stroke="#5a6b7b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="590" y="427" width="220" height="55" rx="8" fill="#f4f6f8" stroke="#5a6b7b" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="700" y="450" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" font-weight="700" fill="#1e2a38">Google Gemini API</text>
  <text x="700" y="468" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#5a6b7b">gemini-2.0-flash (external)</text>

  <!-- MongoDB Atlas external -->
  <line x1="450" y1="387" x2="450" y2="425" stroke="#5a6b7b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="340" y="427" width="220" height="55" rx="8" fill="#f4f6f8" stroke="#5a6b7b" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="450" y="450" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" font-weight="700" fill="#1e2a38">MongoDB Atlas</text>
  <text x="450" y="468" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#5a6b7b">"queries" collection (external, cloud)</text>

  <!-- Legend -->
  <rect x="60" y="520" width="18" height="18" fill="#ffffff" stroke="#1e2a38" stroke-width="2"/>
  <text x="86" y="534" font-family="Segoe UI, Arial" font-size="12" fill="#1e2a38">Component you build (Spring Boot classes)</text>
  <rect x="60" y="550" width="18" height="18" fill="#f4f6f8" stroke="#5a6b7b" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="86" y="564" font-family="Segoe UI, Arial" font-size="12" fill="#1e2a38">External managed service (not built by you)</text>
</svg>
